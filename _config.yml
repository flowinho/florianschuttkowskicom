# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: florian schuttkowski
description: >- # this means to ignore newlines until "baseurl:"
  Wie alles was ich tue, widme ich diese Website den drei Frauen,
  die mein Leben tagtäglich bereichern: meinen Kinder und meiner Partnerin. Danke für eure Liebe und die
  Erfahrungen, die ich an eurer Seite machen darf. 
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com

include: ['_pages']

permalink: /:year/:title:output_ext

theme: minima

minima:
  date_format: "%m.%d.%Y"

plugins:
  - jekyll-feed

